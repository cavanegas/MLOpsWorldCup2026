name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check src tests

      - name: Black --check
        run: uv run black --check src tests

      - name: Pytest
        run: uv run pytest -q

  build-image:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t worldcup2026:ci .
