# Default hyperparameters used by the Prefect flow.
# Override via environment variables or the `wc2026 train` CLI.
model_name: gbt
params:
  n_estimators: 250
  max_depth: 3
  learning_rate: 0.05
  random_state: 42
test_fraction: 0.15
cv_splits: 5
# Options: null | Staging | Production
promote_to_stage: Staging
